<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <div>

        <nav class="navbar navbar-expand-lg w-100">
            <div class="container d-flex align-items-center justify-content-between">
                <a class="navbar-brand d-flex align-items-center text-light" href="#">
                    <img src="./images/ChatGPT_Image_Mar_17__2026__03_21_01_PM-removebg-preview.png" width="80"

            </div>

        <!-- SEARCH-CARD -->

            <div class="d-flex gap-2 align-items-center justify-content-center flex-column "

        </div>
         <div class="row gap-2 justify-content-center">
